<!DOCTYPE html>
<html lang="en">
<head>

<body>
    <h2>Tổng các số chẵn từ 1 đến 20</h2>
<script>
let total = 0
for (let i = 1; i <= 20; i++) {
    if (i % 2 == 0) {
        total = total + i
    }
}
console.log("Tổng là: " + total)

</script>

</body>
</html>
