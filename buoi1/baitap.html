<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>

body{
  margin:0;
  background:white;
}

.container{
  display:grid;
  grid-template-columns: 1fr 1fr 1fr 1fr 1fr 1fr 1fr 1fr 1fr 1fr 1fr 1fr;
  grid-template-rows: 70px 70px 70px 70px 70px 70px 70px 70px;
  gap:8px;
  padding:8px;
  background:black; 
}
#item{
  border:2px solid black;
}
.item1{  
  background: yellow;
  grid-column:1/2;
  grid-row:1/4;
}
.item2{  
  background:red;
  grid-column:2/4;
  grid-row:1/4;
}
.item3{  
  background:white;
  grid-column:4/7;
  grid-row:1/3;
}
.item4{  
  background:white;
  grid-column:4/7;
  grid-row:3/4;
}
.item5{  
  background:white;
  grid-column:7/8;
  grid-row:1/2;
}
.item6{  
  background:white;
  grid-column:7/8;
  grid-row:2/3;
}
.item7{  
  background:yellow;
  grid-column:7/8;
  grid-row:3/4;
}
.item8{   
  background:white;
  grid-column:1/3;
  grid-row:4/7;
}
.item9{  
  background:yellow;
  grid-column:1/3;
  grid-row:7/8;
}
.item10{  
  background:red;
  grid-column:3/5;
  grid-row:4/6;
}
.item11{  
  background:white;
  grid-column:5/8;
  grid-row:4/5;
}
.item12{  
  background:white;
  grid-column:5/8;
  grid-row:7/8;
}
.item13{  
  background:red;
  grid-column:5/8;
  grid-row:5/7;
}
.item14{
  background:white; 
  grid-column:3/5; 
  grid-row:6/8;
  }
</style>
</head>

<body>

<div class="container">
 <div class=" item1"></div>
 <div class=" item2"></div>
 <div class=" item3"></div>
 <div class=" item4"></div>
 <div class=" item5"></div>
 <div class=" item6"></div>
 <div class=" item7"></div>
 <div class=" item8"></div>
 <div class=" item9"></div>
 <div class=" item10"></div>
 <div class=" item11"></div>
 <div class=" item12"></div>
 <div class=" item13"></div>
 <div class=" item14"></div>

</div>

</body>
</html>
