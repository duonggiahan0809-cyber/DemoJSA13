<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            display: grid ;
            grid-template-columns: auto auto auto auto ;
            grid-column-gap: 10px;
            grid-row-gap: 20px;
            background-color: rgb(49, 51, 52);
            padding: 10px;
            border-radius: 10px;
        }
        .a{
            background-color: yellow;
        }
        .b { 
            background-color: red;
        }
        .c {
            background-color: yellow;
        }
    </style>
</head>
<body>
    <div class=" container ">
       <div class="a">1</div>
       <div class="b">2</div>
       <div class="c">3</div>
       <div class="d">4</div>
       <div class="e">5</div>
       <div class="f">6</div>
       <div class="g">7</div>
    </div>
    
</body>
</html>
