<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
    body{
        background: #f5f5f5;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
    }

    .box{
        background:white;
        padding:30px;
        border-radius:10px;
        box-shadow:0 0 15px rgba(0,0,0,0.15);
        width:350px;
    }
</style>
</head>
<body>
   <div class="box">
    <form action="" id="loginForm">
    </div>
        <table>
            <tr>
                <td>
                    <label for="">Username</label>
                </td>
                <td>
                    <input type="text" name="username">
                </td>
            </tr>
            <tr>
                <td>
                    <label for="">Password</label>
                </td>
                <td>
                    <input type="password" name="password" required minlength="8">
                </td>
            </tr>
            <tr>
                <td>
                    <button class="btn btn-info">Submit</button>
                </td>
            </tr>
        </table>
    </form>

    <p id="result"></p>
    <div id="alertBox"></div>

<script>
    let loginF = document.getElementById("loginForm")

    let taikhoan = [
        {"username": "admin", "password": "1234567890"},
        {"username": "user1", "password": "12121212"},
        {"username": "student1", "password": "34343434"},
    ]

    loginF.addEventListener("submit", function(event) {

        event.preventDefault()

        let name = loginF.username.value
        let pass = loginF.password.value

        if (pass.length < 8) {
            document.getElementById("result").innerHTML = "Mật khẩu phải ít nhất 8 ký tự"
            return
        }

        let timThay = false

        for (let i = 0; i < taikhoan.length; i++) {

            if (name == taikhoan[i].username) {

                timThay = true

                if (pass == taikhoan[i].password) {
                    document.getElementById("result").innerHTML = "Đăng nhập thành công"
                } else {
                    document.getElementById("result").innerHTML = "Sai mật khẩu"
                }

                break
            }
        }

        if (timThay == false) {
    document.getElementById("alertBox").innerHTML =
        '<div class="alert alert-danger mt-3">Không tìm thấy tài khoản</div>'
}

    })
</script>

</body>
</html>
