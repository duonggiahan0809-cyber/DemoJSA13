<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        html,body{
            height:100%;
        }
        body{
            background:#f5f5f5;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            gap:20px;
        }
    </style>
</head>
<body>

<form action="" id="loginForm">
    <table>
        <tr>
            <td><label>Username</label></td>
            <td><input type="text" name="username"></td>
        </tr>
        <tr>
            <td><label>Password</label></td>
            <td><input type="password" name="password" required minlength="8"></td>
        </tr>
        <tr>
            <td><button class="btn btn-info">Submit</button></td>
        </tr>
    </table>
</form>

<form id="registerForm">
    <table>
        <tr>
            <td><label>New Username</label></td>
            <td><input type="text" name="newusername"></td>
        </tr>
        <tr>
            <td><label>New Password</label></td>
            <td><input type="password" name="newpass" required minlength="8"></td>
        </tr>
        <tr>
            <td><button class="btn btn-success">Ok</button></td>
        </tr>
    </table>
</form>

<p id="kqdk"></p>
<p id="result"></p>
<div id="alertBox"></div>

<script>

let loginF = document.getElementById("loginForm")

let taikhoan = [
    {"username": "admin", "password": "1234567890"},
    {"username": "user1", "password": "12121212"},
    {"username": "student1", "password": "34343434"},
]

loginF.addEventListener("submit", function(event) {

    event.preventDefault()

    document.getElementById("alertBox").innerHTML = ""   // ⭐ reset alert

    let name = loginF.username.value
    let pass = loginF.password.value

    if (pass.length < 8) {
        document.getElementById("result").innerHTML = "Mật khẩu phải ít nhất 8 ký tự"
        return
    }

    let timThay = false

    for (let i = 0; i < taikhoan.length; i++) {

        if (name == taikhoan[i].username) {

            timThay = true

            if (pass == taikhoan[i].password) {
                document.getElementById("result").innerHTML = "Đăng nhập thành công"
            } else {
                document.getElementById("result").innerHTML = "Sai mật khẩu"
            }

            break
        }
    }

    if (!timThay) {
        document.getElementById("alertBox").innerHTML =
        '<div class="alert alert-danger mt-3">Không tìm thấy tài khoản</div>'
    }

})

let regF = document.getElementById("registerForm")

regF.addEventListener("submit", function(e){

    e.preventDefault()

    let userMoi = regF.newusername.value
    let passMoi = regF.newpass.value

    if(passMoi.length < 8){
        document.getElementById("kqdk").innerHTML = "Mật khẩu phải ít nhất 8 kí tự"
        return
    }

    let trung = false

    for(let i=0;i<taikhoan.length;i++){
        if(userMoi == taikhoan[i].username){
            trung = true
            break
        }
    }

    if(trung){
        document.getElementById("kqdk").innerHTML = "Tài khoản đã tồn tại"
    }else{

        taikhoan[taikhoan.length] = {
            username: userMoi,
            password: passMoi
        }

        document.getElementById("kqdk").innerHTML = "Đăng kí thành công"

        regF.reset()   // ⭐ reset form sau khi đăng kí

        console.log(taikhoan)
    }

})

</script>

</body>
</html>
